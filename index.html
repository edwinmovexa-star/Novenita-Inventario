<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Inventario</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      background: #f4f6f8;
    }

    h1 {
      margin-bottom: 20px;
    }

    .buscador-contenedor {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 10px 0;
      background: #f4f6f8;
    }

    #buscador {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    #buscador:focus {
      border-color: #1565c0;
    }

    #contador {
      margin-bottom: 15px;
      font-size: 14px;
      color: #555;
    }

    .tabla-contenedor {
      width: 100%;
      overflow-x: auto;
      background: transparent;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: transparent;
    }

    th,
    td {
      padding: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      text-align: left;
      border: none;
      border-bottom: 1px solid #666;
    background: transparent;
    }

    th {
      position: sticky;
      z-index: 10;
      color: white;
      border-radius: 10px;
      background: #d89bd8;
      border:none;
    }

    tbody tr:hover {
      background: #f5f5f5;
    }

    td:last-child {
      font-weight: bold;
      color: #1565c0;
    }

    #cargando,
    #finResultados,
    #sinResultados {
      padding: 20px;
      text-align: center;
      color: #666;
    }

    #cargando,
    #finResultados,
    #sinResultados {
      display: none;
    }

    #observador {
      width: 100%;
      height: 20px;
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      th,
      td {
        padding: 8px;
        font-size: 12px;
      }

      /* th {
        top: 91px;
      } */
    }
  </style>
</head>

<body>

  <h1>Inventario</h1>

  <div class="buscador-contenedor">
    <input
      type="text"
      id="buscador"
      placeholder="Buscar por clave, descripción o ubicación..."
      autocomplete="off"
    />

    <div id="contador">
      Cargando inventario...
    </div>
  </div>

  <div class="tabla-contenedor">
    <table>
      <thead>
        <tr>
          <th>Clave</th>
          <th>Descripción</th>
          <th>Ubicación</th>
        </tr>
      </thead>

      <tbody id="tabla"></tbody>
    </table>

    <div id="cargando">
      Cargando más productos...
    </div>

    <div id="sinResultados">
      No se encontraron productos.
    </div>

    <div id="finResultados">
      Ya se mostraron todos los productos.
    </div>

    <div id="observador"></div>
  </div>

  <script>
    let inventario = [];
    let resultados = [];

    const cantidadPorCarga = 100;

    let cantidadMostrada = 0;
    let cargando = false;
    let temporizadorBusqueda;

    const tabla = document.getElementById("tabla");
    const buscador = document.getElementById("buscador");
    const contador = document.getElementById("contador");
    const mensajeCargando = document.getElementById("cargando");
    const mensajeFin = document.getElementById("finResultados");
    const mensajeSinResultados =
      document.getElementById("sinResultados");
    const elementoObservador =
      document.getElementById("observador");

    fetch("./inventario.json")
      .then(response => {
        if (!response.ok) {
          throw new Error(
            `Error ${response.status}: no se pudo cargar inventario.json`
          );
        }

        return response.json();
      })
      .then(data => {
        if (!Array.isArray(data)) {
          throw new Error(
            "El contenido de inventario.json no es un arreglo."
          );
        }

        inventario = data;
        resultados = inventario;

        reiniciarTabla();
      })
      .catch(error => {
        console.error("Error al cargar el JSON:", error);

        contador.textContent =
          "No se pudo cargar el inventario.";

        mensajeSinResultados.textContent =
          "Verifica que inventario.json esté en la misma carpeta y abre el proyecto con Live Server.";

        mensajeSinResultados.style.display = "block";
      });

    function reiniciarTabla() {
      tabla.innerHTML = "";
      cantidadMostrada = 0;

      mensajeFin.style.display = "none";
      mensajeCargando.style.display = "none";
      mensajeSinResultados.style.display = "none";

      if (resultados.length === 0) {
        contador.textContent = "0 productos encontrados";
        mensajeSinResultados.style.display = "block";
        return;
      }

      cargarMasProductos();
    }

    function cargarMasProductos() {
      if (cargando) {
        return;
      }

      if (cantidadMostrada >= resultados.length) {
        mostrarFin();
        return;
      }

      cargando = true;
      mensajeCargando.style.display = "block";

      const inicio = cantidadMostrada;

      const final = Math.min(
        inicio + cantidadPorCarga,
        resultados.length
      );

      const fragmento = document.createDocumentFragment();

      for (let indice = inicio; indice < final; indice++) {
        const producto = resultados[indice];
        console.log(producto);
        

        const fila = document.createElement("tr");

        const celdaClave = document.createElement("td");
        celdaClave.textContent = producto.Clave || "";

        const celdaDescripcion = document.createElement("td");
        celdaDescripcion.textContent =
          producto.Descripción || "";

        const celdaUbicacion = document.createElement("td");
        celdaUbicacion.textContent =
          producto.Ubicación || "";

        fila.appendChild(celdaClave);
        fila.appendChild(celdaDescripcion);
        fila.appendChild(celdaUbicacion);

        fragmento.appendChild(fila);
      }

      tabla.appendChild(fragmento);

      cantidadMostrada = final;
      cargando = false;

      mensajeCargando.style.display = "none";

      actualizarContador();

      if (cantidadMostrada >= resultados.length) {
        mostrarFin();
      }
    }

    function actualizarContador() {
      contador.textContent =
        `Mostrando ${cantidadMostrada.toLocaleString("es-MX")} ` +
        `de ${resultados.length.toLocaleString("es-MX")} productos`;
    }

    function mostrarFin() {
      mensajeCargando.style.display = "none";

      if (resultados.length > 0) {
        mensajeFin.style.display = "block";
      }
    }

    function normalizarTexto(valor) {
      return String(valor || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    buscador.addEventListener("input", function () {
      clearTimeout(temporizadorBusqueda);

      temporizadorBusqueda = setTimeout(() => {
        const texto = normalizarTexto(buscador.value);

        if (texto === "") {
          resultados = inventario;
          reiniciarTabla();
          return;
        }

        resultados = inventario.filter(producto => {
          const clave = normalizarTexto(producto.Clave);
          const descripcion =
            normalizarTexto(producto.Descripción);
          const ubicacion =
            normalizarTexto(producto.Ubicación);

          return (
            clave.includes(texto) ||
            descripcion.includes(texto) ||
            ubicacion.includes(texto)
          );
        });

        reiniciarTabla();
      }, 250);
    });

    const observer = new IntersectionObserver(
      entradas => {
        const entrada = entradas[0];

        if (entrada.isIntersecting) {
          cargarMasProductos();
        }
      },
      {
        root: null,
        rootMargin: "300px",
        threshold: 0
      }
    );

    observer.observe(elementoObservador);
  </script>

</body>
</html>
